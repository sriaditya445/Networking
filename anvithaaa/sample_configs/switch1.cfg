version 15.2
service timestamps log datetime msec localtime show-timezone
service password-encryption
hostname ACCESS-SW-01
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
aaa accounting exec default start-stop group tacacs+
!
no ip domain-lookup
login block-for 120 attempts 5 within 60
dot1x system-auth-control
!
ip domain-name corp.example.com
ip name-server 10.1.1.10
!
clock timezone EST -5 0
ntp server 10.1.1.11
!
snmp-server community SECURE-SNMP RO ACL_SNMP
snmp-server location ACCESS-SW-01-FLOOR2
snmp-server contact netops@corp.example.com
!
logging buffered 64000
logging console informational
logging host 10.1.1.12
!
spanning-tree mode rapid-pvst
spanning-tree portfast bpduguard default
spanning-tree loopguard default
!
ip routing
!
interface Loopback0
 description Management Loopback
 ip address 10.1.100.1 255.255.255.255
!
interface GigabitEthernet1/0/1
 description User Access Port
 switchport mode access
 switchport port-security
 switchport nonegotiate
 spanning-tree portfast
!
interface Port-channel1
 description Uplink to Distribution
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
!
redundancy
 mode sso
!
