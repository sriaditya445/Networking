version 17.3
service timestamps log datetime msec localtime show-timezone
service password-encryption
hostname WLC-9800-01
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authentication dot1x default group radius
!
no ip domain-lookup
!
ip domain-name corp.example.com
ip name-server 10.1.1.10
!
ntp server 10.1.1.11
!
snmp-server community WLC-SNMP RO ACL_SNMP
!
logging buffered 64000
logging host 10.1.1.12
!
radius server ISE-PRIMARY
 address ipv4 10.1.1.20 auth-port 1812 acct-port 1813
!
tacacs server TACACS-PRIMARY
 address ipv4 10.1.1.21
!
wireless profile policy DEFAULT-WIRELESS-POLICY
!
wlan 1 CORP-WLAN
 ssid CORP-WLAN
 no shutdown
!
wlan 2 GUEST-WLAN
 ssid GUEST-WLAN
 no shutdown
!
ap dot11 24ghz rf-profile LOW-DENSITY
 channel auto
!
ap dot11 5ghz rf-profile HIGH-DENSITY
 channel auto
!
flow monitor wireless-avc-basic
!
parameter-map type webauth global
 type webauth
!
redundancy
 mode sso
!
